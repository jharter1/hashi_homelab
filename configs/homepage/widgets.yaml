---
# Search bar
- search:
    provider: google
    target: _blank
    focus: true
    showSearchSuggestions: true

# Date and time
- datetime:
    text_size: xl
    format:
      timeStyle: short
      dateStyle: long
      hour12: true

# Weather
- openweathermap:
    label: Chicago
    latitude: 41.8781
    longitude: -87.6298
    units: imperial
    provider: openweathermap
    apiKey: 8cff25cca0e4cf3dcf9aca5b8ca3f378
    cache: 5

# Greeting
- greeting:
    text_size: xl
    text: "Jack's Homelab"

