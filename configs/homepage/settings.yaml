---
title: Homelab
favicon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nomad.png
logo: mdi-home-network-outline

# Background image — updated daily by the wallpaper-rotate Nomad job (8 AM Chicago).
# This default is overwritten on every homepage:sync. That's intentional —
# the sync task forces wallpaper-rotate immediately after to pick a fresh image.
background:
  image: https://s3.lab.hartr.net/wallpapers/rainbow-feather-bird-colorful.jpg
  blur: sm
  saturate: 75
  brightness: 60
  opacity: 35

theme: dark
color: slate
headerStyle: boxed

layout:
  Infrastructure:
    style: row
    columns: 4
    icon: mdi-server-network
  Monitoring:
    style: row
    columns: 3
    icon: mdi-chart-line
  System:
    style: row
    columns: 6
    icon: mdi-cog-outline
    collapsible: true
    initiallyCollapsed: true
  Development:
    style: row
    columns: 3
    icon: mdi-code-braces
  Content:
    style: row
    columns: 5
    icon: mdi-bookshelf
  Tools:
    style: row
    columns: 4
    icon: mdi-wrench-outline
  Storage:
    style: row
    columns: 1
    icon: mdi-database-outline
  Security:
    style: row
    columns: 1
    icon: mdi-shield-lock-outline

quicklaunch:
  searchDescriptions: true
  hideInternetSearch: false
  hideVisitURL: false

statusStyle: "dot"
showStats: true

customCss: |
  .service-card {
    transition: transform 0.2s;
  }
  .service-card:hover {
    transform: scale(1.03);
  }
