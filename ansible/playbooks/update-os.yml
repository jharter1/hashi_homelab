---
# Update all packages and reboot if required.
# Servers are updated one at a time to preserve Consul/Nomad quorum.
# Clients are updated one at a time to avoid losing too many workloads at once.
#
# Usage:
#   task ansible:update:os            # update + reboot if needed
#   task ansible:update:os -- -e "reboot_if_required=false"   # update only, no reboots

- name: Update OS packages on Nomad servers
  hosts: nomad_servers
  become: yes
  serial: 1

  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
        post_reboot_delay: 15
      when:
        - reboot_required_file.stat.exists
        - reboot_if_required | default(true) | bool

    - name: Wait for Consul to be healthy after reboot
      ansible.builtin.uri:
        url: "http://localhost:8500/v1/status/leader"
        status_code: 200
      register: consul_health
      retries: 20
      delay: 5
      until: consul_health.status == 200
      when: reboot_required_file.stat.exists

    - name: Wait for Nomad to be healthy after reboot
      ansible.builtin.uri:
        url: "http://localhost:4646/v1/status/leader"
        status_code: 200
      register: nomad_health
      retries: 20
      delay: 5
      until: nomad_health.status == 200
      when: reboot_required_file.stat.exists


- name: Update OS packages on Nomad clients
  hosts: nomad_clients
  become: yes
  serial: 1

  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required
      ansible.builtin.reboot:
        reboot_timeout: 300
        post_reboot_delay: 15
      when:
        - reboot_required_file.stat.exists
        - reboot_if_required | default(true) | bool

    - name: Wait for Consul to be healthy after reboot
      ansible.builtin.uri:
        url: "http://localhost:8500/v1/status/leader"
        status_code: 200
      register: consul_health
      retries: 20
      delay: 5
      until: consul_health.status == 200
      when: reboot_required_file.stat.exists
